// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        def offlineRepoPath = System.getenv("XPRESSINTRA_GRADLE_OFFLINE_REPO")
        def offlineRepo = offlineRepoPath ? file(offlineRepoPath) : file("offline-maven")
        if (offlineRepo.exists()) {
            maven { url offlineRepo }
        }
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        def offlineRepoPath = System.getenv("XPRESSINTRA_GRADLE_OFFLINE_REPO")
        def offlineRepo = offlineRepoPath ? file(offlineRepoPath) : rootProject.file("offline-maven")
        if (offlineRepo.exists()) {
            maven { url offlineRepo }
        }
        google()
        mavenCentral()
    }

    tasks.withType(JavaCompile).configureEach {
        options.fork = true
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

